<svg xmlns="http://www.w3.org/2000/svg" width="260" height="460" viewBox="0 0 260 460">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Teko:wght@500;600&amp;family=Barlow+Condensed:wght@400;500;600&amp;display=swap');
    </style>
    <clipPath id="phone-clip-w">
      <rect x="4" y="4" width="252" height="452" rx="28"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="2" y="2" width="256" height="456" rx="30" fill="none" stroke="#333" stroke-width="2"/>

  <g clip-path="url(#phone-clip-w)">
    <!-- Background with amber tint -->
    <rect x="4" y="4" width="252" height="452" fill="#000000"/>
    <rect x="4" y="4" width="252" height="452" fill="#FFB300" opacity="0.06"/>

    <!-- Status bar area -->
    <rect x="4" y="4" width="252" height="28" fill="rgba(0,0,0,0.3)"/>

    <!-- Close button -->
    <text x="24" y="56" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">&#x2715;</text>

    <!-- Round indicator -->
    <text x="130" y="90" font-family="'Teko', sans-serif" font-size="20" fill="rgba(255,255,255,0.87)" text-anchor="middle" letter-spacing="2" font-weight="500">ROUND 3 / 8</text>

    <!-- Progress ring -->
    <g transform="translate(130, 200)">
      <circle cx="0" cy="0" r="80" fill="none" stroke="#222222" stroke-width="10"/>
      <!-- ~6% remaining -->
      <circle cx="0" cy="0" r="80" fill="none" stroke="#FFB300" stroke-width="10"
        stroke-linecap="round"
        stroke-dasharray="502.65"
        stroke-dashoffset="469.14"
        transform="rotate(-90 0 0)"/>
    </g>

    <!-- Countdown -->
    <text x="130" y="215" font-family="'Bebas Neue', Impact, sans-serif" font-size="64" fill="#FFB300" text-anchor="middle" letter-spacing="2">0:08</text>

    <!-- Phase label -->
    <text x="130" y="310" font-family="'Teko', sans-serif" font-size="28" fill="#FFB300" text-anchor="middle" letter-spacing="3" font-weight="600">WORK</text>

    <!-- Controls -->
    <circle cx="60" cy="370" r="26" fill="none" stroke="#FFB300" stroke-width="2"/>
    <text x="60" y="377" font-family="Arial, sans-serif" font-size="18" fill="#FFB300" text-anchor="middle">&#x23EE;</text>

    <circle cx="130" cy="370" r="32" fill="#FFB300"/>
    <text x="130" y="378" font-family="Arial, sans-serif" font-size="22" fill="#000" text-anchor="middle">&#x23F8;</text>

    <circle cx="200" cy="370" r="26" fill="none" stroke="#FFB300" stroke-width="2"/>
    <text x="200" y="377" font-family="Arial, sans-serif" font-size="18" fill="#FFB300" text-anchor="middle">&#x23ED;</text>

    <!-- Elapsed -->
    <text x="130" y="430" font-family="'Barlow Condensed', sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" text-anchor="middle">Total: 15:12 elapsed</text>
  </g>
</svg>
