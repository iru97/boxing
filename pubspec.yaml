name: boxing
description: "Boxing training timer with configurable rounds, rest periods, and audio cues."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  just_audio: ^0.9.43
  audio_service: ^0.18.17
  wakelock_plus: ^1.3.1
  uuid: ^4.5.1
  clock: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  fake_async: ^1.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
